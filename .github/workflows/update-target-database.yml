name: Update Target Database

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-target-database:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Run target database update
        env:
          HANOI_SYNTHETIC_DB_HOST: ${{ secrets.HANOI_SYNTHETIC_DB_HOST }}
          HANOI_SYNTHETIC_DB_USER: ${{ secrets.HANOI_SYNTHETIC_DB_USER }}
          HANOI_SYNTHETIC_DB_PASS: ${{ secrets.HANOI_SYNTHETIC_DB_PASS }}
          HANOI_SYNTHETIC_DB_NAME: ${{ secrets.HANOI_SYNTHETIC_DB_NAME }}
          HANOI_SYNTHETIC_DB_PORT: ${{ secrets.HANOI_SYNTHETIC_DB_PORT }}
        run: python update_target_database.py